name: Testsigma CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  run-testsigma:
    runs-on: windows-latest        # ← Change this

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Testsigma Test Plan
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          Set-Location "${{ github.workspace }}"
          .\testsigma-trigger.ps1
