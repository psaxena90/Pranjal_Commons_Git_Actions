name: Testsigma CI

on:
 push:
   branches:
     - main
     - master
 workflow_dispatch:

jobs:
 run-testsigma:
   runs-on: ubuntu-latest

   steps:
     - name: Checkout code
       uses: actions/checkout@v3

     - name: Make script executable
       run: chmod +x testsigma-trigger.sh

     - name: Run Testsigma Test Plan
       run: ./testsigma-trigger.ps1
